<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HydroTrack — Owner Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===================== LAYAR PIN ===================== -->
  <div id="pin-screen">
    <h1>🔒 Owner Dashboard</h1>
    <p>Masukkan PIN untuk melanjutkan</p>
    <input type="password" id="pin-input" placeholder="Masukkan PIN" />
    <button id="pin-submit-btn" onclick="submitPin()">Masuk</button>
    <p id="pin-error" style="color:red; display:none;">PIN salah, coba lagi.</p>
  </div>

  <!-- ===================== DASHBOARD OWNER ===================== -->
  <div id="dashboard" style="display:none;">
    <h1>💧 HydroTrack — Owner Dashboard</h1>

    <!-- FORM TAMBAH USER -->
    <section id="add-user-section">
      <h2>Tambah User Baru</h2>
      <div id="add-user-form">
        <label for="new-name">Nama:</label>
        <input type="text" id="new-name" placeholder="cth: Budi" />

        <label for="new-target">Target Harian (ml):</label>
        <input type="number" id="new-target" placeholder="cth: 2000" min="100" step="50" />

        <label for="new-can-see">
          <input type="checkbox" id="new-can-see" checked />
          Boleh lihat progress user lain?
        </label>

        <button id="add-user-btn" onclick="addUser()">+ Tambah User</button>
        <p id="add-user-error" style="color:red; display:none;"></p>
      </div>
    </section>

    <!-- TABEL SEMUA USER -->
    <section id="users-section">
      <h2>Daftar User</h2>
      <p id="loading-users">Memuat data user...</p>
      <table id="users-table" style="display:none;">
        <thead>
          <tr>
            <th>Nama</th>
            <th>Progress Hari Ini</th>
            <th>Target</th>
            <th>Lihat User Lain</th>
            <th>Link</th>
            <th>Hapus</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <!-- Diisi oleh JS -->
        </tbody>
      </table>
      <p id="no-users-msg" style="display:none;">Belum ada user. Tambahkan user baru di atas.</p>
    </section>
  </div>

  <!-- Firebase SDK v9 (CDN, tidak perlu npm) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Config -->
  <script src="firebase-config.js"></script>

  <!-- Logic Owner -->
  <script src="owner.js"></script>
</body>
</html>
