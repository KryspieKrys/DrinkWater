<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HydroTrack — Owner Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===================== LAYAR PIN ===================== -->
  <div id="pin-screen" class="center-screen">
    <div class="glass">
      <h1>🔒 Owner Dashboard</h1>
      <p style="margin-bottom: 15px;">Masukkan PIN untuk melanjutkan</p>
      <input type="password" id="pin-input" placeholder="Masukkan PIN" />
      <button id="pin-submit-btn" onclick="submitPin()" style="width: 100%;">Masuk</button>
      <p id="pin-error" style="color:#ffcccc; display:none; margin-top: 10px;">PIN salah, coba lagi.</p>
    </div>
  </div>

  <!-- ===================== DASHBOARD OWNER ===================== -->
  <div id="dashboard" class="app-container" style="display:none; max-width: 800px;">
    <header>
      <h1>💧 HydroTrack</h1>
      <h2>Owner Dashboard</h2>
    </header>

    <!-- FORM TAMBAH USER -->
    <div id="add-user-section" class="glass">
      <h2>Tambah User Baru</h2>
      <div id="add-user-form">
        <label for="new-name">Nama:</label>
        <input type="text" id="new-name" placeholder="cth: Budi" />

        <label for="new-target">Target Harian (ml):</label>
        <input type="number" id="new-target" placeholder="cth: 2000" min="100" step="50" />

        <label for="new-can-see" style="display: flex; align-items: center; gap: 10px; margin: 10px 0;">
          <input type="checkbox" id="new-can-see" class="checkbox-custom" checked style="width: auto;" />
          Boleh lihat progress user lain?
        </label>

        <button id="add-user-btn" onclick="addUser()">+ Tambah User</button>
        <p id="add-user-error" style="color:#ffcccc; display:none; margin-top:10px;"></p>
      </div>
    </div>

    <!-- TABEL SEMUA USER -->
    <div id="users-section" class="glass">
      <h2>Daftar User</h2>
      <p id="loading-users">Memuat data user...</p>
      <div class="owner-table-wrapper">
        <table id="users-table" style="display:none;">
          <thead>
            <tr>
              <th>Nama</th>
              <th>Progress</th>
              <th>Target</th>
              <th>Izin Lihat</th>
              <th>Link</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <!-- Diisi oleh JS -->
          </tbody>
        </table>
      </div>
      <p id="no-users-msg" style="display:none;">Belum ada user. Tambahkan user baru di atas.</p>
    </div>
  </div>

  <!-- Firebase SDK v9 (CDN, tidak perlu npm) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Config -->
  <script src="firebase-config.js"></script>

  <!-- Logic Owner -->
  <script src="owner.js"></script>
</body>
</html>
