<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DRINKWATTEAAH</title>

  <!-- PWA Manifest (Android/Chrome) -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#74ebd5" />

  <!-- ✅ iOS Safari PWA Meta Tags (WAJIB untuk iPhone) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DRINKWAT" />

  <!-- ✅ iOS App Icons (semua ukuran yang dibutuhkan iPhone/iPad) -->
  <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icon-192.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />

  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>

  <!-- ===================== LAYAR ERROR ===================== -->
  <div id="error-screen" class="center-screen" style="display:none;">
    <div class="glass">
      <h1>⚠️ Link Tidak Valid</h1>
      <p>Link yang Anda gunakan tidak ditemukan atau sudah dihapus. Hubungi Owner untuk mendapatkan link baru.</p>
    </div>
  </div>

  <!-- ===================== LOADING ===================== -->
  <div id="loading-screen" class="center-screen">
    <div class="loader"></div>
    <p>Memuat data...</p>
  </div>

  <!-- ===================== HALAMAN UTAMA USER ===================== -->
  <div id="user-page" class="app-container" style="display:none;">

    <!-- Header -->
    <header>
      <div class="user-badge">
        <span>👤</span> <span id="user-name-display">Alex</span>
      </div>
      <h1 id="user-greeting">DRINKWATTEAAH</h1>
      <p id="today-date">Today, October 26</p>
    </header>

    <!-- SVG Water Glass -->
    <div class="progress-wrapper">
      <svg id="water-glass-svg" viewBox="0 0 200 340" xmlns="http://www.w3.org/2000/svg" width="200" height="340" overflow="visible">
        <defs>
          <clipPath id="glass-clip">
            <path d="M 34,22 L 166,22 L 145,312 L 55,312 Z"/>
          </clipPath>
        </defs>

        <!-- Clipped water fill area -->
        <g clip-path="url(#glass-clip)">
          <g id="water-group" transform="translate(0, 312)">
            <!-- Wave back -->
            <path class="wave-back" d="M-200,0 Q-150,-10 -100,0 T0,0 T100,0 T200,0 T300,0 T400,0 L400,400 L-200,400 Z" fill="rgba(255,255,255,0.2)"/>
            <!-- Wave front -->
            <path class="wave-front" d="M-200,0 Q-150,10 -100,0 T0,0 T100,0 T200,0 T300,0 T400,0 L400,400 L-200,400 Z" fill="rgba(255,255,255,0.35)"/>
            <!-- Water body -->
            <rect x="-10" y="10" width="220" height="400" fill="rgba(255,255,255,0.18)"/>
          </g>
        </g>

        <!-- Glass outline (drawn over water) -->
        <path d="M 30,18 L 170,18 L 148,314 L 52,314 Z" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linejoin="round"/>
        <!-- Top rim -->
        <ellipse cx="100" cy="18" rx="70" ry="7" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
        <!-- Bottom -->
        <ellipse cx="100" cy="314" rx="48" ry="5" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
        <!-- Left shine -->
        <path d="M 46,36 Q 53,110 49,220" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="6" stroke-linecap="round"/>
        <!-- Right shine -->
        <path d="M 152,36 Q 155,80 153,130" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>

        <!-- Bebek: DI LUAR clip-path agar tidak terpotong saat di atas rim gelas -->
        <!-- y diatur oleh JS mengikuti posisi air via duck-group -->
        <g id="duck-group" transform="translate(0, 301)">
          <image class="duck-swim" href="SwimDuck.png" x="67" y="-55" width="66" height="66"/>
        </g>

        <!-- Text overlay -->
        <text id="svg-amount" x="100" y="168" text-anchor="middle" font-family="Poppins,sans-serif" font-size="30" font-weight="700" fill="white">0ml</text>
        <text id="svg-goal" x="100" y="196" text-anchor="middle" font-family="Poppins,sans-serif" font-size="13" font-weight="500" fill="rgba(255,255,255,0.85)">of 2000 ml Goal</text>
        <text id="svg-percent" x="100" y="216" text-anchor="middle" font-family="Poppins,sans-serif" font-size="12" fill="rgba(255,255,255,0.7)">0%</text>
      </svg>
    </div>

    <!-- Quick Add Water -->
    <div class="glass">
      <h2>Quick Add Water</h2>
      <div class="quick-add-grid">
        <button onclick="quickAdd(150)">+150ml</button>
        <button onclick="quickAdd(300)">+300ml</button>
        <button onclick="quickAdd(500)">+500ml</button>
        <button onclick="quickAdd(750)">+750ml</button>
      </div>

      <h2 style="margin-top: 20px;">Custom Amount</h2>
      <div class="input-group">
        <input type="number" id="drink-amount" placeholder="Enter Amount ml" min="1" max="5000" />
        <button id="drink-btn" onclick="addDrink()">ADD</button>
      </div>
    </div>

    <!-- Target Setting -->
    <div class="glass">
      <h2>Daily Goal</h2>
      <div class="input-group">
        <input type="number" id="target-input" placeholder="Goal (ml)" min="100" />
        <button id="save-target-btn" onclick="saveTarget()">Update</button>
      </div>
      <p id="target-status" style="font-size: 0.8rem; text-align: right; height: 15px;"></p>
    </div>

    <!-- Riwayat Log Hari Ini -->
    <div class="glass">
      <h2>Today's Logs</h2>
      <ul id="log-list" class="log-list">
        <!-- Diisi oleh JS -->
      </ul>
      <p id="no-log-msg">Belum ada catatan hari ini.</p>
    </div>

    <!-- Progress User Lain -->
    <div id="others-section" class="glass" style="display:none;">
      <h2>Friends' Progress</h2>
      <div id="others-list">
        <!-- Diisi oleh JS -->
      </div>
    </div>

  </div>

  <!-- ===================== MEME POPUP (saat buka app) ===================== -->
  <div id="meme-overlay" class="popup-overlay" style="display:none;">
    <img id="meme-img" class="popup-img" src="" alt="" />
  </div>

  <!-- ===================== CONGRATS POPUP (saat target tercapai) ===================== -->
  <div id="congrats-overlay" class="popup-overlay" style="display:none;">
    <canvas id="confetti-canvas"></canvas>
    <img id="congrats-img" class="popup-img" src="" alt="" />
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="popup.js"></script>
  <script src="user.js"></script>
  <script>
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(console.error);
  </script>
</body>
</html>
